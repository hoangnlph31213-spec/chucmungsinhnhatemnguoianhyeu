


<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  #app{min-height:650px;font-family:'Nunito',sans-serif;position:relative;overflow:hidden;background:transparent}
  #lockScreen{min-height:650px;background:linear-gradient(135deg,#ffd6e7 0%,#ffb3d1 40%,#ff85b3 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative}
  .bubble{position:absolute;border-radius:50%;opacity:.18;pointer-events:none}
  .b1{width:180px;height:180px;background:#fff;top:-40px;left:-40px}
  .b2{width:120px;height:120px;background:#ff69b4;bottom:-20px;right:-20px}
  .b3{width:80px;height:80px;background:#fff;bottom:60px;left:30px}
  .hearts-row{position:absolute;top:12px;left:0;width:100%;display:flex;justify-content:space-around;font-size:14px;opacity:.5;pointer-events:none}
  .lock-card{background:rgba(255,255,255,.55);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.8);border-radius:28px;padding:2rem 1.8rem 1.8rem;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(255,105,180,.2);position:relative;z-index:1}
  .char-area{width:110px;height:110px;border-radius:50%;background:rgba(255,182,213,.3);border:2.5px dashed #ff85b3;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
  .char-area:hover{background:rgba(255,182,213,.5)}
  .char-area img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;inset:0}
  .char-icon{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:36px}
  .char-icon span.lbl{font-size:10px;color:#e75480}
  input[type=file]{display:none}
  .lock-title{font-size:16px;font-weight:800;color:#c2185b;letter-spacing:.5px;margin-bottom:1.4rem;text-transform:uppercase}
  .dots{display:flex;justify-content:center;gap:10px;margin-bottom:1.4rem;height:20px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;border:2px solid #e75480;background:transparent;transition:.2s}
  .dot.filled{background:#e75480}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{padding:14px 0;border:none;border-radius:14px;background:rgba(255,255,255,.75);color:#c2185b;font-size:20px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:.15s;border:1px solid rgba(255,182,213,.5);box-shadow:0 2px 8px rgba(255,105,180,.12)}
  .key:hover{background:#fff;transform:translateY(-1px)}
  .key:active{transform:scale(.95)}
  .key.confirm{background:#e75480;color:#fff}
  .key.confirm:hover{background:#c2185b}
  .key.del{color:#e75480}
  .errmsg{font-size:13px;min-height:18px;margin-top:.8rem;font-weight:600;color:#e74c3c}
  .shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  #bdScreen{display:none;min-height:650px;position:relative;overflow:hidden;background:linear-gradient(160deg,#fff0f5 0%,#ffe4f0 50%,#ffd6e7 100%)}

  .blob{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;opacity:.55}

  .music-bar.paused .music-note{animation-play-state:paused}
  .music-text .mt{font-weight:700;color:#c2185b;font-size:12px}
  .music-text .ms{color:#e75480;font-size:11px}

  .photo-slot{aspect-ratio:1;border-radius:12px;border:1.5px dashed #ffb3d1;background:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;font-size:20px;transition:.2s}

</style>

<script>
const PWD="2110";let entered="";let musicPaused=false;
function press(n){if(entered.length>=4)return;entered+=n;updateDots();if(entered.length===4)setTimeout(confirmPwd,200)}
function del(){entered=entered.slice(0,-1);updateDots();document.getElementById('errmsg').textContent=''}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<entered.length)}
function confirmPwd(){
  if(entered===PWD){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('bdScreen').classList.add('show');
    document.getElementById('musicBar').classList.add('show');
    setTimeout(()=>{
      document.getElementById('cakeWrap').classList.add('appear');
      document.getElementById('bdTitle').classList.add('appear');
      document.getElementById('bdSub').classList.add('appear');
      document.getElementById('arrowBtn').classList.add('appear');
    },100);
    launchConfetti();
  } else {
    document.getElementById('errmsg').textContent='Sai rồi, thử lại nha! 💔';
    document.getElementById('numpad').classList.add('shake');
    setTimeout(()=>document.getElementById('numpad').classList.remove('shake'),350);
    entered='';updateDots();
  }
}
function toggleMusic(){
  const iframe=document.getElementById('ytPlayer');
  musicPaused=!musicPaused;
  document.getElementById('musicToggle').textContent=musicPaused?'▶':'⏸';
  document.getElementById('musicBar').classList.toggle('paused',musicPaused);
  iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:musicPaused?'pauseVideo':'playVideo',args:''}),'*');
}
function setCharImg(input){
  if(!input.files[0])return;
  const url=URL.createObjectURL(input.files[0]);
  const area=document.getElementById('charArea');area.innerHTML='';
  const img=document.createElement('img');img.src=url;area.appendChild(img);
}
function showSurprise(){
  document.getElementById('surpriseSection').classList.add('show');
  document.getElementById('surpriseSection').style.display='block';
  document.getElementById('arrowBtn').style.display='none';
  setTimeout(()=>document.getElementById('surpriseSection').scrollIntoView({behavior:'smooth'}),100);
}
function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
}
function addPhotos(input){
  const grid=document.getElementById('photoGrid');
  Array.from(input.files).forEach(file=>{
    const url=URL.createObjectURL(file);
    const slot=document.createElement('div');slot.className='photo-slot';
    const img=document.createElement('img');img.src=url;slot.appendChild(img);
    grid.appendChild(slot);
  });input.value='';
}
function addVideos(input){
  const list = document.getElementById('videoList');

  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);

    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.style.width = "100%";
    video.style.borderRadius = "12px";
    video.style.marginBottom = "10px";

    list.appendChild(video);
  });

  input.value = '';
}

function launchConfetti(){
  const c=document.getElementById('bdConfetti');const ctx=c.getContext('2d');c.width=c.offsetWidth||800;
  const pieces=Array.from({length:70},()=>({x:Math.random()*c.width,y:-10,r:Math.random()*6+3,color:['#f472b6','#fb923c','#a78bfa','#fde68a','#fecdd3','#fff'][Math.floor(Math.random()*6)],speed:Math.random()*3+1,angle:Math.random()*Math.PI*2,spin:Math.random()*.1-.05,dx:Math.random()*2-1}));
  let frame=0;
  (function draw(){ctx.clearRect(0,0,c.width,200);pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5);ctx.restore();p.y+=p.speed;p.x+=p.dx;p.angle+=p.spin});frame++;if(frame<150)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,200)})();
}
</script>
